name: puresip_purchasing
description: A purchasing system for multiple companies.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.8

  # Utilities
  shared_preferences: ^2.5.3
  logger: ^2.6.0
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  permission_handler: ^12.0.1
  leak_tracker: ^10.0.9

  # PDF and Printing
  printing: ^5.12.0
  pdf: ^3.10.4

  # UI
  image_picker: ^1.1.0
  flutter_svg: ^2.2.0
  go_router: ^16.0.0
  flutter_screenutil: ^5.9.3
  gap: ^3.0.1

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Localization
  easy_localization: ^3.0.7+1

  # Google Sign-In
  google_sign_in: ^7.1.0

  # Rive Animation (optional)
  # rive: ^0.13.20
  # rive_common: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/images/splash_screen.jpg
    - assets/images/no_internet.png
    - assets/lang/                   # مجلد الترجمة
    - assets/animation/headless_bear.riv
    - assets/svgs/                   # مجلد الرسوم المتجهة

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300

# # Optional override to disable rive_common plugin on Windows (if causing build issues)
