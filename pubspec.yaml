name: puresip_purchasing
description: A purchasing system for multiple companies.

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.14.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.9
  printing: ^5.12.0
  pdf: ^3.10.4
  image_picker: ^1.1.0
  firebase_storage: ^12.4.8
  logger: ^2.6.0
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.5.3
  go_router: ^16.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/images/splash_screen.jpg # تأكد من وجود هذا السطر